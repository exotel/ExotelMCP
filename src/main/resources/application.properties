spring.application.name=mcp_api

# Server
server.port=${PORT:8080}
spring.main.web-application-type=servlet

# HTTP Buffer Configuration
server.tomcat.max-http-response-header-size=65536
server.tomcat.max-swallow-size=10MB
server.tomcat.max-http-post-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# HTTP connection and timeout settings
server.tomcat.connection-timeout=30000
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# Spring Web
spring.web.resources.add-mappings=false
server.error.whitelabel.enabled=false

# Database (H2 for callback tracking)
spring.datasource.url=jdbc:h2:file:./data/exotel_callbacks
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${H2_PASSWORD:password}
spring.h2.console.enabled=false

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Exotel CPaaS callback URL (your public-facing URL for webhooks)
exotel.base.url=${EXOTEL_CALLBACK_URL:http://localhost:8080}

# VoiceBot defaults (overridden by Authorization header in production)
exotel.voicebot.api.key=${VOICEBOT_API_KEY:}
exotel.voicebot.api.token=${VOICEBOT_API_TOKEN:}
exotel.voicebot.account.id=${VOICEBOT_ACCOUNT_ID:}
exotel.voicebot.base.url=${VOICEBOT_BASE_URL:https://voicebot.in.exotel.com/voicebot/api/v2}
exotel.voicebot.calls.base.url=${CALLS_BASE_URL:https://api.in.exotel.com}
exotel.voicebot.ssl.verify=${SSL_VERIFY:true}
exotel.voicebot.calls.force.http=${CALLS_FORCE_HTTP:false}

# Calls API defaults (overridden by Authorization header)
exotel.calls.account.sid=${CALLS_ACCOUNT_SID:}
exotel.calls.api.key=${CALLS_API_KEY:}
exotel.calls.api.token=${CALLS_API_TOKEN:}

# Default caller ID
exotel.voicebot.default.caller.id=${DEFAULT_CALLER_ID:}

# Session cookies (optional, for dev only)
exotel.voicebot.session.cookie=${VOICEBOT_SESSION_COOKIE:}
exotel.voicebot.device.session.cookie=${DEVICE_SESSION_COOKIE:}

# Logging
logging.level.com.example.mcp_api=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=./logs/mcp-server.log
